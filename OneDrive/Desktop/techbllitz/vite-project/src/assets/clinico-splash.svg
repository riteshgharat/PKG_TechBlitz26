<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#edf4ff" />
    </radialGradient>
    
    <radialGradient id="glowG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0" />
    </radialGradient>
    
    <linearGradient id="ecgGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0" />
      <stop offset="15%" stop-color="#60A5FA" stop-opacity="1" />
      <stop offset="85%" stop-color="#60A5FA" stop-opacity="1" />
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#2563EB" flood-opacity="0.15" />
    </filter>
  </defs>

  <style>
    .logo-group {
      opacity: 0;
      transform-origin: 400px 240px;
      animation: clinicoFadeScale 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }
    .glow-circle {
      transform-origin: 400px 240px;
      animation: clinicoPulseGlow 2.5s infinite ease-out;
    }
    .ecg-line {
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
      animation: clinicoDrawEcg 2.5s cubic-bezier(0.4, 0, 0.2, 1) 0.6s forwards;
    }
    .loading-dot {
      animation: clinicoDotBounce 1.4s infinite ease-in-out;
    }
    .dot-1 { animation-delay: 0s; }
    .dot-2 { animation-delay: 0.2s; }
    .dot-3 { animation-delay: 0.4s; }

    @keyframes clinicoFadeScale {
      0% { opacity: 0; transform: scale(0.85) translateY(15px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes clinicoPulseGlow {
      0% { transform: scale(0.8); opacity: 0; }
      50% { opacity: 0.6; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    @keyframes clinicoDrawEcg {
      0% { stroke-dashoffset: 1200; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes clinicoDotBounce {
      0%, 100% { transform: translateY(0); opacity: 0.3; }
      50% { transform: translateY(-8px); opacity: 1; }
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  
  <!-- Glow Behind Logo -->
  <circle cx="400" cy="240" r="100" fill="url(#glowG)" class="glow-circle" />

  <!-- Logo and Text -->
  <g class="logo-group" filter="url(#shadow)">
    <!-- Medical Cross -->
    <rect x="390" y="230" width="20" height="60" rx="3" fill="#2563EB" />
    <rect x="370" y="250" width="60" height="20" rx="3" fill="#2563EB" />
    
    <!-- Stethoscope -->
    <circle cx="340" cy="80" r="8" fill="#2563EB" />
    <circle cx="460" cy="80" r="8" fill="#2563EB" />
    <path d="M 340 80 C 340 140, 385 170, 400 170 M 460 80 C 460 140, 415 170, 400 170" fill="none" stroke="#2563EB" stroke-width="9" stroke-linecap="round" />
    <path d="M 400 170 A 90 90 0 1 0 490 260" fill="none" stroke="#2563EB" stroke-width="11" stroke-linecap="round" />
    <circle cx="500" cy="260" r="16" fill="#2563EB" />
    <circle cx="500" cy="260" r="6" fill="#ffffff" />
    
    <!-- Clinico Text -->
    <text x="400" y="400" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-weight="800" font-size="46" fill="#2563EB" letter-spacing="1px">Clinico</text>
  </g>

  <!-- ECG Line -->
  <path class="ecg-line" d="M 0 480 L 250 480 Q 270 460, 290 480 L 350 480 L 370 500 L 400 410 L 420 530 L 440 480 L 490 480 Q 510 445, 530 480 L 800 480" fill="none" stroke="url(#ecgGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Loading Dots -->
  <circle cx="370" cy="550" r="5" fill="#60A5FA" class="loading-dot dot-1" />
  <circle cx="400" cy="550" r="5" fill="#60A5FA" class="loading-dot dot-2" />
  <circle cx="430" cy="550" r="5" fill="#60A5FA" class="loading-dot dot-3" />
</svg>
